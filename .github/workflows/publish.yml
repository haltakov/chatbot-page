name: Publish chatbot-page

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: corepack pnpm@10.0.0 install --frozen-lockfile

      - name: Verify release tag
        run: |
          PACKAGE_VERSION="$(node -p "require('./packages/chatbot-page/package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Run CI checks
        run: corepack pnpm@10.0.0 run ci

      - name: Publish package
        working-directory: packages/chatbot-page
        run: npm publish --provenance --access public
